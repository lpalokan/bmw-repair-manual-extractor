<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>BMW Repair Manual</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: Helvetica, Arial, sans-serif; max-width: 1100px;
           margin: 0 auto; padding: 24px 16px; background: #f5f5f5; }
    h1   { color: #003399; margin-bottom: 4px; }
    .subtitle { color: #666; margin-top: 0 0 24px; font-size: 11pt; }
    .grid { display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 14px; margin-top: 24px; }
    .card { background: #fff; border: 1px solid #ddd; border-radius: 6px;
             padding: 10px; text-decoration: none; color: inherit; display: block;
             transition: box-shadow .15s, border-color .15s; }
    .card:hover { border-color: #003399; box-shadow: 0 2px 8px rgba(0,51,153,.15); }
    .card-img  { width: 100%; height: 90px; object-fit: contain;
                  background: #f8f8f8; border-radius: 3px; }
    .card-code { font-size: 10px; color: #999; margin-top: 8px; }
    .card-name { font-weight: bold; font-size: 12px; margin-top: 3px;
                  line-height: 1.3; }
  </style>
</head>
<body>
  <h1>BMW Repair Manual</h1>
  <p class="subtitle">{{ models|length }} models available &mdash; click a model to browse procedures</p>

  <div class="grid">
    {% for m in models %}
    <a class="card" href="/model/{{ m.code }}">
      <img class="card-img"
           src="/model-image/{{ m.code }}"
           onerror="this.style.visibility='hidden'">
      <div class="card-code">{{ m.code }}</div>
      <div class="card-name">{{ m.name }}</div>
    </a>
    {% endfor %}
  </div>
</body>
</html>
