<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ model.name }} ({{ model.code }}) — BMW Repair Manual</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: Helvetica, Arial, sans-serif; max-width: 900px;
           margin: 0 auto; padding: 24px 16px; background: #f5f5f5; }
    .back { color: #003399; font-size: 12px; text-decoration: none; }
    .back:hover { text-decoration: underline; }
    .header { display: flex; align-items: center; gap: 20px; margin: 16px 0 24px; }
    .header img { max-height: 100px; max-width: 160px;
                   object-fit: contain; background: #fff;
                   border: 1px solid #ddd; border-radius: 4px; padding: 4px; }
    h1 { color: #003399; margin: 0 0 4px; }
    .subtitle { color: #666; margin: 0; font-size: 11pt; }
    ul { list-style: none; padding: 0; background: #fff;
          border: 1px solid #ddd; border-radius: 6px; overflow: hidden; }
    li a { display: block; padding: 9px 14px; border-bottom: 1px solid #eee;
            text-decoration: none; color: #222; font-size: 10pt; }
    li:last-child a { border-bottom: none; }
    li a:hover { background: #f0f4ff; color: #003399; }
  </style>
</head>
<body>
  <a class="back" href="/">&larr; All models</a>

  <div class="header">
    {% if model.image_path %}
    <img src="/model-image/{{ model.code }}"
         onerror="this.style.display='none'">
    {% endif %}
    <div>
      <h1>{{ model.name }}</h1>
      <p class="subtitle">Model {{ model.code }} &mdash; {{ procedures|length }} repair procedures</p>
    </div>
  </div>

  <ul>
    {% for proc in procedures %}
    <li>
      <a href="/procedure/{{ model.code }}/{{ proc.db_path }}">{{ proc.name }}</a>
    </li>
    {% endfor %}
  </ul>
</body>
</html>
